
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QuizzyBee - Result</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">QuizzyBee</div>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="createQuiz.html">Create Quiz</a>
      <a class="nav-link" href="joinQuiz.html">Join Quiz</a>
      <a class="nav-link" href="generateQuiz.html">AI Quiz</a>
      <a class="nav-link" href="partyMode.html">Party Mode</a>
      <a class="nav-link active" href="result.html">Results</a>
    </aside>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <div class="topbar-title">Quiz Results</div>
          <div class="topbar-subtitle">See how you performed</div>
        </div>
        <div class="topbar-profile">
          <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
          <div class="topbar-profile-text">
            <span class="topbar-profile-label">Logged in as</span>
            <span class="topbar-profile-email" data-topbar-email>Guest</span>
          </div>
        </div>
      </header>
      <main class="page-content">
        <h1>Your Score:</h1>
        <p id="score"></p>
        <h2 id="pointsHeading" hidden>Total Points:</h2>
        <p id="points" hidden></p>
        <p id="teamSummary" hidden></p>
        <div id="teamLeaderboardSection" hidden>
          <h2>Team Leaderboard</h2>
          <ol id="teamLeaderboard"></ol>
        </div>
        <div id="leaderboardSection" hidden>
          <h2>Leaderboard</h2>
          <ol id="leaderboard"></ol>
        </div>
        <button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
      </main>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/session.js"></script>
  <script>
    renderTopbarProfile();

    const savedScore = localStorage.getItem("score");
    document.getElementById("score").innerText =
      savedScore !== null ? savedScore : "No score available";

    const isGroupQuiz = localStorage.getItem("isGroupQuiz") === "true";
    const totalPoints = localStorage.getItem("totalPoints");
    const quizCode = localStorage.getItem("quizCode");
    const lastAttemptId = localStorage.getItem("lastAttemptId");
    const teamId = localStorage.getItem("teamId");
    const teamName = localStorage.getItem("teamName");
    const partySettings = JSON.parse(localStorage.getItem("partySettings") || "null");
    const isTeamMode = Boolean(partySettings && partySettings.teamMode);
    const hasLeaderboard = !partySettings || partySettings.leaderboard !== false;

    if (isGroupQuiz) {
      document.getElementById("pointsHeading").hidden = false;
      document.getElementById("points").hidden = false;
      document.getElementById("leaderboardSection").hidden = !hasLeaderboard;
      document.getElementById("points").innerText =
        totalPoints !== null ? totalPoints : "No points recorded";

      if (quizCode) {
        firebase.firestore()
          .collection("quizzes")
          .doc(quizCode)
          .collection("attempts")
          .get()
          .then(snapshot => {
            const attempts = snapshot.docs
              .map(doc => ({ id: doc.id, ...doc.data() }))
              .sort((a, b) => {
                if (b.totalPoints !== a.totalPoints) {
                  return b.totalPoints - a.totalPoints;
                }

                return a.totalTimeMs - b.totalTimeMs;
              });

            if (hasLeaderboard) {
              const leaderboard = document.getElementById("leaderboard");
              leaderboard.innerHTML = "";

              attempts.forEach(attempt => {
                const isCurrentAttempt = attempt.id === lastAttemptId;
                const item = document.createElement("li");
                item.innerText =
                  `${attempt.playerName} - ${attempt.totalPoints} pts - ${Math.round(attempt.totalTimeMs / 1000)} sec`;

                if (isCurrentAttempt) {
                  item.innerText += " (You)";
                }

                leaderboard.appendChild(item);
              });
            }

            if (isTeamMode) {
              document.getElementById("teamSummary").hidden = false;
              document.getElementById("teamLeaderboardSection").hidden = !hasLeaderboard;
              document.getElementById("teamSummary").innerText =
                teamName ? `You played for ${teamName}.` : "You were not assigned to a team.";

              const teamTotals = {};
              attempts.forEach(attempt => {
                if (!attempt.teamId) {
                  return;
                }

                if (!teamTotals[attempt.teamId]) {
                  teamTotals[attempt.teamId] = {
                    teamId: attempt.teamId,
                    teamName: attempt.teamName || attempt.teamId,
                    totalPoints: 0,
                    totalTimeMs: 0
                  };
                }

                teamTotals[attempt.teamId].totalPoints += attempt.totalPoints || 0;
                teamTotals[attempt.teamId].totalTimeMs += attempt.totalTimeMs || 0;
              });

              if (hasLeaderboard) {
                const teamLeaderboard = document.getElementById("teamLeaderboard");
                teamLeaderboard.innerHTML = "";

                Object.values(teamTotals)
                  .sort((a, b) => {
                    if (b.totalPoints !== a.totalPoints) {
                      return b.totalPoints - a.totalPoints;
                    }

                    return a.totalTimeMs - b.totalTimeMs;
                  })
                  .forEach(team => {
                    const item = document.createElement("li");
                    item.innerText =
                      `${team.teamName} - ${team.totalPoints} pts - ${Math.round(team.totalTimeMs / 1000)} sec`;

                    if (team.teamId === teamId) {
                      item.innerText += " (Your Team)";
                    }

                    teamLeaderboard.appendChild(item);
                  });
              }
            }
          });
      }
    }
  </script>
</body>
</html>
