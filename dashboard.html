<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>
<div class="profile-card">
  <div class="profile-avatar" id="profileAvatar">U</div>
  <div class="profile-details">
    <p class="profile-label">Logged in as</p>
    <p class="profile-email" id="profileEmail">Loading...</p>
  </div>
</div>

<button onclick="goToCreateQuiz()">Create Quiz</button>
<button onclick="goToJoinQuiz()">Join Quiz</button>
<button onclick="goToAiQuiz()">AI Generated Quiz</button>
<button onclick="startPracticeQuiz()">Practice Quiz</button>

<button onclick="logout()">Logout</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/session.js"></script>
<script src="js/questions.js"></script>

<script>
function renderUserProfile(user) {
  const email = user.email || localStorage.getItem("currentUserEmail") || "Unknown user";
  const initials = email.charAt(0).toUpperCase();

  document.getElementById("profileEmail").innerText = email;
  document.getElementById("profileAvatar").innerText = initials;
}

protectPage();

function resetQuizSession() {
  localStorage.removeItem("quizData");
  localStorage.removeItem("quizTopic");
  localStorage.removeItem("score");
  localStorage.removeItem("totalPoints");
  localStorage.removeItem("quizCode");
  localStorage.removeItem("isGroupQuiz");
  localStorage.removeItem("attemptDetails");
  localStorage.removeItem("lastAttemptId");
}

function goToCreateQuiz() {
  resetQuizSession();
  window.location.href = "createQuiz.html";
}

function goToJoinQuiz() {
  resetQuizSession();
  window.location.href = "joinQuiz.html";
}

function goToAiQuiz() {
  resetQuizSession();
  window.location.href = "generateQuiz.html";
}

function startPracticeQuiz() {
  localStorage.setItem("quizData", JSON.stringify(sampleQuestions));
  localStorage.removeItem("quizTopic");
  localStorage.removeItem("score");
  localStorage.removeItem("quizCode");
  localStorage.setItem("isGroupQuiz", "false");
  window.location.href = "quiz.html";
}

function logout() {
  resetQuizSession();
  localStorage.removeItem("currentUserEmail");
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
