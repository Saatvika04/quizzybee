<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">QuizzyBee</div>
    <a class="nav-link active" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="createQuiz.html">Create Quiz</a>
    <a class="nav-link" href="joinQuiz.html">Join Quiz</a>
    <a class="nav-link" href="generateQuiz.html">AI Quiz</a>
  </aside>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-subtitle">Choose how you want to quiz today</div>
      </div>
      <div class="topbar-profile">
        <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
        <div class="topbar-profile-text">
          <span class="topbar-profile-label">Logged in as</span>
          <span class="topbar-profile-email" data-topbar-email>Loading...</span>
        </div>
      </div>
    </header>
    <main class="page-content">
      <h1>QuizzyBee</h1>

      <button onclick="goToCreateQuiz()">Create Quiz</button>
      <button onclick="goToJoinQuiz()">Join Quiz</button>
      <button onclick="goToAiQuiz()">AI Generated Quiz</button>

      <button onclick="logout()">Logout</button>
    </main>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/session.js"></script>

<script>
protectPage();

function resetQuizSession() {
  localStorage.removeItem("quizData");
  localStorage.removeItem("quizTopic");
  localStorage.removeItem("score");
  localStorage.removeItem("totalPoints");
  localStorage.removeItem("quizCode");
  localStorage.removeItem("isGroupQuiz");
  localStorage.removeItem("isPartyMode");
  localStorage.removeItem("partySettings");
  localStorage.removeItem("participantId");
  localStorage.removeItem("teamId");
  localStorage.removeItem("teamName");
  localStorage.removeItem("attemptDetails");
  localStorage.removeItem("lastAttemptId");
}

function goToCreateQuiz() {
  resetQuizSession();
  window.location.href = "createQuiz.html";
}

function goToJoinQuiz() {
  resetQuizSession();
  window.location.href = "joinQuiz.html";
}

function goToAiQuiz() {
  resetQuizSession();
  window.location.href = "generateQuiz.html";
}

function logout() {
  resetQuizSession();
  localStorage.removeItem("currentUserEmail");
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
