<!DOCTYPE html>
<html>
<body>

<h2>Join Quiz</h2>

<input id="code" placeholder="Enter Quiz Code">
<button onclick="joinQuiz()">Start Quiz</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>
function joinQuiz() {
  const code = document.getElementById("code").value;
  const db = firebase.firestore();

  db.collection("quizzes").doc(code).get()
    .then(doc => {
      if (doc.exists) {
        localStorage.setItem("quizData", JSON.stringify(doc.data().questions));
        window.location.href = "quiz.html";
      } else {
        alert("Invalid quiz code");
      }
    });
}
</script>

</body>
</html>
