<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Join Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">QuizzyBee</div>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="createQuiz.html">Create Quiz</a>
    <a class="nav-link active" href="joinQuiz.html">Join Quiz</a>
    <a class="nav-link" href="generateQuiz.html">AI Quiz</a>
  </aside>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <div class="topbar-title">Join Quiz</div>
        <div class="topbar-subtitle">Enter a room code and start competing</div>
      </div>
      <div class="topbar-profile">
        <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
        <div class="topbar-profile-text">
          <span class="topbar-profile-label">Logged in as</span>
          <span class="topbar-profile-email" data-topbar-email>Guest</span>
        </div>
      </div>
    </header>
    <main class="page-content">
      <h2>Join Quiz</h2>

      <input id="code" placeholder="Enter Quiz Code">
      <input id="playerName" placeholder="Enter your name for the leaderboard">
      <button onclick="joinQuiz()">Start Quiz</button>
    </main>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/session.js"></script>

<script>
renderTopbarProfile();

async function registerParticipant(quizCode, quiz, playerName) {
  const participantRef = firebase.firestore()
    .collection("quizzes")
    .doc(quizCode)
    .collection("participants")
    .doc();

  await participantRef.set({
    playerName,
    playerEmail: localStorage.getItem("currentUserEmail") || "",
    joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
    isHost: false,
    isPartyMode: Boolean(quiz.isPartyMode),
    teamId: null,
    teamName: null
  });

  localStorage.setItem("participantId", participantRef.id);
  localStorage.removeItem("teamId");
  localStorage.removeItem("teamName");
}

function joinQuiz() {
  const code = document.getElementById("code").value;
  const db = firebase.firestore();

  db.collection("quizzes").doc(code).get()
    .then(async doc => {
      if (doc.exists) {
        const quiz = doc.data();
        const playerName = document.getElementById("playerName").value.trim();

        if (quiz.isGroupQuiz && !playerName) {
          alert("Please enter your name to join a group quiz.");
          return;
        }

        localStorage.setItem("quizData", JSON.stringify(quiz.questions));
        localStorage.setItem("quizCode", code);
        localStorage.setItem("isGroupQuiz", String(Boolean(quiz.isGroupQuiz)));
        localStorage.setItem("isPartyMode", String(Boolean(quiz.isPartyMode)));
        localStorage.setItem("partySettings", JSON.stringify(quiz.partySettings || null));
        localStorage.removeItem("score");
        localStorage.removeItem("totalPoints");
        localStorage.removeItem("attemptDetails");
        localStorage.removeItem("lastAttemptId");
        localStorage.setItem(
          "playerName",
          playerName || localStorage.getItem("currentUserEmail") || "Guest Player"
        );
        await registerParticipant(
          code,
          quiz,
          playerName || localStorage.getItem("currentUserEmail") || "Guest Player"
        );
        window.location.href = "quiz.html";
      } else {
        alert("Invalid quiz code");
      }
    });
}
</script>

</body>
</html>
