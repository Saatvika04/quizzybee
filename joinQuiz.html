<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Join Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">QuizzyBee</div>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="createQuiz.html">Create Quiz</a>
    <a class="nav-link active" href="joinQuiz.html">Join Quiz</a>
    <a class="nav-link" href="generateQuiz.html">AI Quiz</a>
  </aside>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <div class="topbar-title">Join Quiz</div>
        <div class="topbar-subtitle">Enter a room code and start competing</div>
      </div>
      <div class="topbar-profile">
        <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
        <div class="topbar-profile-text">
          <span class="topbar-profile-label">Logged in as</span>
          <span class="topbar-profile-email" data-topbar-email>Guest</span>
        </div>
      </div>
    </header>
    <main class="page-content">
      <h2>Join Quiz</h2>

      <input id="code" placeholder="Enter Quiz Code">
      <input id="playerName" placeholder="Enter your name for the leaderboard">
      <div class="settings-panel hidden" id="teamChoicePanel">
        <p class="settings-title">Choose Your Team</p>
        <select id="teamChoiceSelect"></select>
      </div>
      <button onclick="joinQuiz()">Start Quiz</button>
    </main>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/session.js"></script>

<script>
renderTopbarProfile();

function getTeamOptions(teamCount) {
  return Array.from({ length: teamCount }, (_, index) => ({
    teamId: `team-${index + 1}`,
    teamName: `Team ${index + 1}`
  }));
}

async function getAutomaticTeamAssignment(quizCode, teamCount) {
  const participantsSnapshot = await firebase.firestore()
    .collection("quizzes")
    .doc(quizCode)
    .collection("participants")
    .get();

  const teamCounts = {};
  getTeamOptions(teamCount).forEach(team => {
    teamCounts[team.teamId] = 0;
  });

  participantsSnapshot.forEach(doc => {
    const participant = doc.data();

    if (participant.teamId && teamCounts[participant.teamId] !== undefined) {
      teamCounts[participant.teamId] += 1;
    }
  });

  const sortedTeams = Object.entries(teamCounts).sort((a, b) => a[1] - b[1]);
  const selectedTeamId = sortedTeams[0][0];
  const selectedTeamName = getTeamOptions(teamCount).find(team => team.teamId === selectedTeamId).teamName;

  return {
    teamId: selectedTeamId,
    teamName: selectedTeamName
  };
}

function populateTeamChoice(teamCount) {
  const teamChoiceSelect = document.getElementById("teamChoiceSelect");
  teamChoiceSelect.innerHTML = "";

  getTeamOptions(teamCount).forEach(team => {
    const option = document.createElement("option");
    option.value = team.teamId;
    option.text = team.teamName;
    teamChoiceSelect.appendChild(option);
  });
}

async function registerParticipant(quizCode, quiz, playerName, teamAssignment) {
  const participantRef = firebase.firestore()
    .collection("quizzes")
    .doc(quizCode)
    .collection("participants")
    .doc();

  await participantRef.set({
    playerName,
    playerEmail: localStorage.getItem("currentUserEmail") || "",
    joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
    isHost: false,
    isPartyMode: Boolean(quiz.isPartyMode),
    teamId: teamAssignment ? teamAssignment.teamId : null,
    teamName: teamAssignment ? teamAssignment.teamName : null
  });

  localStorage.setItem("participantId", participantRef.id);
  localStorage.setItem("teamId", teamAssignment ? teamAssignment.teamId : "");
  localStorage.setItem("teamName", teamAssignment ? teamAssignment.teamName : "");
}

function joinQuiz() {
  const code = document.getElementById("code").value;
  const db = firebase.firestore();

  db.collection("quizzes").doc(code).get()
    .then(async doc => {
      if (doc.exists) {
        const quiz = doc.data();
        const playerName = document.getElementById("playerName").value.trim();
        const partySettings = quiz.partySettings || {};
        const isTeamMode = Boolean(partySettings.teamMode);
        const isManualTeamChoice = partySettings.teamAssignmentMode === "manual";
        let teamAssignment = null;

        if (quiz.isGroupQuiz && !playerName) {
          alert("Please enter your name to join a group quiz.");
          return;
        }

        if (isTeamMode) {
          if (isManualTeamChoice) {
            const teamChoicePanel = document.getElementById("teamChoicePanel");
            const existingCode = teamChoicePanel.dataset.quizCode;

            if (teamChoicePanel.classList.contains("hidden") || existingCode !== code) {
              populateTeamChoice(partySettings.teamCount || 2);
              teamChoicePanel.dataset.quizCode = code;
              teamChoicePanel.classList.remove("hidden");
              alert("Choose a team and click Start Quiz again.");
              return;
            }

            const selectedTeamId = document.getElementById("teamChoiceSelect").value;
            teamAssignment = {
              teamId: selectedTeamId,
              teamName: getTeamOptions(partySettings.teamCount || 2)
                .find(team => team.teamId === selectedTeamId).teamName
            };
          } else {
            teamAssignment = await getAutomaticTeamAssignment(code, partySettings.teamCount || 2);
          }
        } else {
          document.getElementById("teamChoicePanel").classList.add("hidden");
        }

        localStorage.setItem("quizData", JSON.stringify(quiz.questions));
        localStorage.setItem("quizCode", code);
        localStorage.setItem("isGroupQuiz", String(Boolean(quiz.isGroupQuiz)));
        localStorage.setItem("isPartyMode", String(Boolean(quiz.isPartyMode)));
        localStorage.setItem("partySettings", JSON.stringify(quiz.partySettings || null));
        localStorage.removeItem("score");
        localStorage.removeItem("totalPoints");
        localStorage.removeItem("attemptDetails");
        localStorage.removeItem("lastAttemptId");
        localStorage.setItem(
          "playerName",
          playerName || localStorage.getItem("currentUserEmail") || "Guest Player"
        );
        await registerParticipant(
          code,
          quiz,
          playerName || localStorage.getItem("currentUserEmail") || "Guest Player",
          teamAssignment
        );
        window.location.href = "quiz.html";
      } else {
        alert("Invalid quiz code");
      }
    });
}
</script>

</body>
</html>
