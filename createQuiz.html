<!DOCTYPE html>
<html>
<body>

<h2>Create Quiz</h2>

<input id="question" placeholder="Enter question">
<input id="option1" placeholder="Option 1">
<input id="option2" placeholder="Option 2">
<input id="answer" placeholder="Correct Answer">

<button onclick="addQuestion()">Add Question</button>
<button onclick="saveQuiz()">Save Quiz</button>

<p id="quizCode"></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>
let questions = [];

function addQuestion() {
  const q = {
    question: document.getElementById("question").value,
    options: [
      document.getElementById("option1").value,
      document.getElementById("option2").value
    ],
    answer: document.getElementById("answer").value
  };

  questions.push(q);
  alert("Question added!");
}

function generateCode() {
  return Math.random().toString(36).substring(2, 8);
}

function saveQuiz() {
  const db = firebase.firestore();
  const code = generateCode();

  db.collection("quizzes").doc(code).set({
    questions: questions
  });

  document.getElementById("quizCode").innerText = "Quiz Code: " + code;
}
</script>

</body>
</html>
