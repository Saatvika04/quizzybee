<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Create Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">QuizzyBee</div>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link active" href="createQuiz.html">Create Quiz</a>
    <a class="nav-link" href="joinQuiz.html">Join Quiz</a>
    <a class="nav-link" href="generateQuiz.html">AI Quiz</a>
  </aside>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <div class="topbar-title">Create Quiz</div>
        <div class="topbar-subtitle">Build your own quiz room</div>
      </div>
      <div class="topbar-profile">
        <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
        <div class="topbar-profile-text">
          <span class="topbar-profile-label">Logged in as</span>
          <span class="topbar-profile-email" data-topbar-email>Guest</span>
        </div>
      </div>
    </header>
    <main class="page-content">
      <h2>Create Quiz</h2>

      <input id="question" placeholder="Enter question">
      <div id="optionsContainer"></div>
      <button type="button" onclick="addOptionInput()">Add Option</button>

      <select id="answer"></select>
      <label class="toggle-label">
        <input type="checkbox" id="groupQuizToggle">
        Group Quiz
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="partyModeToggle">
        Party Mode
      </label>
      <div class="settings-panel hidden" id="partySettingsPanel">
        <p class="settings-title">Party Settings</p>
        <label class="toggle-label">
          <input type="checkbox" id="leaderboardToggle" checked>
          Leaderboard
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="aggressiveTimerToggle">
          Aggressive Timer
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="screenShrinkToggle">
          Screen Shrink
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="lowBatteryWarningToggle">
          Low Battery Warning
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="sabotageToggle">
          Collaborative Sabotage
        </label>
      </div>

      <button onclick="addQuestion()">Add Question</button>
      <button onclick="saveQuiz()">Save Quiz</button>

      <p id="quizCode"></p>
    </main>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/session.js"></script>

<script>
renderTopbarProfile();

let questions = [];
const maxOptions = 10;

function getPartySettings() {
  return {
    leaderboard: document.getElementById("leaderboardToggle").checked,
    aggressiveTimer: document.getElementById("aggressiveTimerToggle").checked,
    screenShrink: document.getElementById("screenShrinkToggle").checked,
    lowBatteryWarning: document.getElementById("lowBatteryWarningToggle").checked,
    sabotage: document.getElementById("sabotageToggle").checked
  };
}

function togglePartySettingsPanel() {
  const isPartyMode = document.getElementById("partyModeToggle").checked;
  document.getElementById("partySettingsPanel").classList.toggle("hidden", !isPartyMode);
}

function createOptionInput(value = "") {
  const optionRow = document.createElement("div");
  optionRow.className = "option-row";

  const input = document.createElement("input");
  input.type = "text";
  input.value = value;
  input.className = "quiz-option-input";
  input.addEventListener("input", updateAnswerOptions);

  const removeButton = document.createElement("button");
  removeButton.type = "button";
  removeButton.className = "remove-option-button";
  removeButton.innerText = "-";
  removeButton.addEventListener("click", () => {
    removeOptionInput(optionRow);
  });

  optionRow.appendChild(input);
  optionRow.appendChild(removeButton);
  document.getElementById("optionsContainer").appendChild(optionRow);
  renumberOptionPlaceholders();
  updateRemoveButtons();
}

function addOptionInput() {
  const optionsContainer = document.getElementById("optionsContainer");

  if (optionsContainer.children.length >= maxOptions) {
    alert("You can add up to 10 options only.");
    return;
  }

  createOptionInput();
  updateAnswerOptions();
}

function removeOptionInput(optionRow) {
  const optionsContainer = document.getElementById("optionsContainer");

  if (optionsContainer.children.length <= 2) {
    alert("A question must have at least 2 options.");
    return;
  }

  optionRow.remove();
  renumberOptionPlaceholders();
  updateRemoveButtons();
  updateAnswerOptions();
}

function updateRemoveButtons() {
  const removeButtons = document.querySelectorAll(".remove-option-button");
  const shouldDisable = removeButtons.length <= 2;

  removeButtons.forEach(button => {
    button.disabled = shouldDisable;
  });
}

function renumberOptionPlaceholders() {
  document.querySelectorAll(".quiz-option-input").forEach((input, index) => {
    input.placeholder = `Option ${index + 1}`;
  });
}

function updateAnswerOptions() {
  const answerSelect = document.getElementById("answer");
  const optionValues = Array.from(document.querySelectorAll(".quiz-option-input"))
    .map(input => input.value.trim())
    .filter(Boolean);

  answerSelect.innerHTML = "";

  if (optionValues.length === 0) {
    const placeholderOption = document.createElement("option");
    placeholderOption.text = "Add options first";
    placeholderOption.value = "";
    answerSelect.appendChild(placeholderOption);
    return;
  }

  optionValues.forEach(option => {
    const answerOption = document.createElement("option");
    answerOption.text = option;
    answerOption.value = option;
    answerSelect.appendChild(answerOption);
  });
}

function resetQuestionForm() {
  document.getElementById("question").value = "";
  document.getElementById("optionsContainer").innerHTML = "";
  createOptionInput();
  createOptionInput();
  updateAnswerOptions();
}

function addQuestion() {
  const questionText = document.getElementById("question").value.trim();
  const optionValues = Array.from(document.querySelectorAll(".quiz-option-input"))
    .map(input => input.value.trim())
    .filter(Boolean);
  const answer = document.getElementById("answer").value;

  if (!questionText) {
    alert("Please enter a question.");
    return;
  }

  if (optionValues.length < 2) {
    alert("Please add at least 2 options.");
    return;
  }

  if (!optionValues.includes(answer)) {
    alert("Please choose a correct answer from the options.");
    return;
  }

  const q = {
    question: questionText,
    options: optionValues,
    answer: answer
  };

  questions.push(q);
  alert("Question added!");
  resetQuestionForm();
}

function generateCode() {
  return Math.random().toString(36).substring(2, 8);
}

function saveQuiz() {
  if (questions.length === 0) {
    alert("Please add at least one question before saving.");
    return;
  }

  const db = firebase.firestore();
  const code = generateCode();
  const isGroupQuiz = document.getElementById("groupQuizToggle").checked;
  const isPartyMode = document.getElementById("partyModeToggle").checked;
  const partySettings = isPartyMode ? getPartySettings() : null;

  db.collection("quizzes").doc(code).set({
    questions: questions,
    isGroupQuiz: isGroupQuiz,
    isPartyMode: isPartyMode,
    partySettings: partySettings,
    createdBy: localStorage.getItem("currentUserEmail") || "Unknown creator"
  });

  document.getElementById("quizCode").innerText =
    "Quiz Code: " + code
    + (isGroupQuiz ? " (Group quiz enabled)" : "")
    + (isPartyMode ? " (Party mode enabled)" : "");
}

document.getElementById("partyModeToggle").addEventListener("change", togglePartySettingsPanel);
togglePartySettingsPanel();
resetQuestionForm();
</script>

</body>
</html>
