<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QuizzyBee - Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">QuizzyBee</div>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="createQuiz.html">Create Quiz</a>
    <a class="nav-link" href="joinQuiz.html">Join Quiz</a>
    <a class="nav-link" href="generateQuiz.html">AI Quiz</a>
  </aside>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <div class="topbar-title">Quiz In Progress</div>
        <div class="topbar-subtitle">Read carefully and answer with confidence</div>
      </div>
      <div class="topbar-profile">
        <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
        <div class="topbar-profile-text">
          <span class="topbar-profile-label">Logged in as</span>
          <span class="topbar-profile-email" data-topbar-email>Guest</span>
        </div>
      </div>
    </header>
    <main class="page-content">
      <div class="team-badge hidden" id="teamBadge"></div>
      <h2 id="question"></h2>
      <div id="options"></div>
    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/session.js"></script>
<script src="js/questions.js"></script>
<script src="js/script.js"></script>

<script>
  renderTopbarProfile();
  initializeQuiz();
</script>

</body>
</html>
