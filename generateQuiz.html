<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QuizzyBee - AI Quiz Generator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">QuizzyBee</div>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="createQuiz.html">Create Quiz</a>
      <a class="nav-link" href="joinQuiz.html">Join Quiz</a>
      <a class="nav-link active" href="generateQuiz.html">AI Quiz</a>
    </aside>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <div class="topbar-title">Generate Quiz with AI</div>
          <div class="topbar-subtitle">Turn a topic into a ready-to-play quiz</div>
        </div>
        <div class="topbar-profile">
          <div class="topbar-profile-avatar" data-topbar-avatar>U</div>
          <div class="topbar-profile-text">
            <span class="topbar-profile-label">Logged in as</span>
            <span class="topbar-profile-email" data-topbar-email>Guest</span>
          </div>
        </div>
      </header>
      <main class="page-content">
        <h2>Generate Quiz with AI</h2>
        <p>Enter a topic and QuizzyBee will create a fresh quiz for you.</p>

        <input id="topic" placeholder="Enter topic (for example: DSA, Operating Systems, Aptitude)">
        <label class="toggle-label">
          <input type="checkbox" id="groupQuizToggle">
          Group Quiz
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="partyModeToggle">
          Party Mode
        </label>
        <div class="settings-panel hidden" id="partySettingsPanel">
          <p class="settings-title">Party Settings</p>
          <label class="toggle-label">
            <input type="checkbox" id="leaderboardToggle" checked>
            Leaderboard
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="aggressiveTimerToggle">
            Aggressive Timer
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="screenShrinkToggle">
            Screen Shrink
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="lowBatteryWarningToggle">
            Low Battery Warning
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="sabotageToggle">
            Collaborative Sabotage
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="teamModeToggle">
            Team Mode
          </label>
          <div class="nested-settings hidden" id="teamSettingsPanel">
            <label for="teamCountSelect" class="settings-inline-label">Number of Teams</label>
            <select id="teamCountSelect">
              <option value="2">2 Teams</option>
              <option value="3">3 Teams</option>
              <option value="4">4 Teams</option>
              <option value="5">5 Teams</option>
              <option value="6">6 Teams</option>
            </select>
            <label for="teamAssignmentModeSelect" class="settings-inline-label">Team Assignment</label>
            <select id="teamAssignmentModeSelect">
              <option value="auto">Automatic Assignment</option>
              <option value="manual">Players Choose Their Team</option>
            </select>
          </div>
        </div>
        <button id="generateButton" onclick="generateQuiz()">Generate Quiz</button>
        <p id="status"></p>
      </main>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/session.js"></script>
  <script>
    renderTopbarProfile();

    function togglePartySettingsPanel() {
      const isPartyMode = document.getElementById("partyModeToggle").checked;
      document.getElementById("partySettingsPanel").classList.toggle("hidden", !isPartyMode);

      if (!isPartyMode) {
        document.getElementById("teamSettingsPanel").classList.add("hidden");
      }
    }

    function toggleTeamSettingsPanel() {
      const isPartyMode = document.getElementById("partyModeToggle").checked;
      const isTeamMode = document.getElementById("teamModeToggle").checked;
      document.getElementById("teamSettingsPanel").classList.toggle("hidden", !(isPartyMode && isTeamMode));
    }

    document.getElementById("partyModeToggle").addEventListener("change", togglePartySettingsPanel);
    document.getElementById("teamModeToggle").addEventListener("change", toggleTeamSettingsPanel);
    togglePartySettingsPanel();
    toggleTeamSettingsPanel();
  </script>
  <script src="js/aiQuiz.js"></script>
</body>
</html>
